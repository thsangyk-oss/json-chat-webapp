<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JSON Context Chat</title>
  <style>
    :root { --bg:#0f1115; --card:#171a21; --muted:#9aa4b2; --text:#e8edf2; --accent:#4f8cff; --danger:#a93b3b; }
    *{box-sizing:border-box}
    html,body{overscroll-behavior-x:none;overscroll-behavior-y:none}
    body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,Arial,sans-serif;touch-action:pan-y}
    .wrap{max-width:900px;margin:0 auto;padding:10px}
    .top{position:sticky;top:0;background:var(--bg);padding:8px 0;z-index:5}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    #customConfirm{background:var(--card);color:var(--text);border:1px solid #2d3a50;border-radius:14px;padding:20px;max-width:320px;margin:auto;box-shadow:0 10px 30px rgba(0,0,0,0.5)}
    #customConfirm::backdrop{background:rgba(0,0,0,0.6);backdrop-filter:blur(3px)}
    #customConfirm p{margin:0 0 20px 0;font-size:15px;line-height:1.4;text-align:center;}
    #customConfirm .actions{display:flex;justify-content:flex-end;gap:10px}
    .banner{display:flex;align-items:center;justify-content:space-between;background:var(--card);border-radius:12px;padding:10px 12px;margin-bottom:8px}
    .banner-title{font-weight:700;font-size:14px;letter-spacing:.2px}
    .icon-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;padding:0;border-radius:10px;font-size:18px;line-height:1}
    .composer-icon-btn{width:48px;height:48px;display:flex;align-items:center;justify-content:center;padding:0;font-size:22px}
    select,button,textarea,input{border:none;border-radius:12px;padding:10px 12px;font-size:14px}
    select,textarea,input{background:var(--card);color:var(--text)}
    button{background:var(--accent);color:white;font-weight:600}
    button.secondary{background:#2a3040;color:#d5def0}
    button.danger{background:var(--danger)}
    input[type="range"]{width:100%;max-width:100%;padding:8px 0;background:transparent;box-sizing:border-box;display:block}
    #chat{display:flex;flex-direction:column;gap:8px;padding:10px 0 120px}
    .msg{padding:10px 12px;border-radius:14px;max-width:86%;white-space:pre-wrap;line-height:1.56;letter-spacing:.1px}
    .me{align-self:flex-end;background:#2a457a}
    .bot{align-self:flex-start;background:#161b24;border:1px solid #232c3b}
    .dialogue-text{font-size:15px;color:#e9edf7}
    .scene-beat{font-size:13px;color:#8ec5ff;opacity:.96;font-style:italic}
    .meta{color:var(--muted);font-size:12px;margin:4px 2px}
    .status-line{font-size:11px;color:#8f9bb0;opacity:.9;padding:2px 4px;min-height:16px;margin-bottom:72px}
    .composer{position:fixed;left:0;right:0;bottom:0;background:linear-gradient(transparent,rgba(15,17,21,.9) 30%, rgba(15,17,21,1));padding:10px}
    .composer-inner{max-width:900px;margin:0 auto;display:flex;gap:8px}
    textarea{flex:1;min-height:48px;max-height:140px;resize:vertical}
    .panel{background:var(--card);border-radius:14px;padding:10px}
    .hidden{display:none}
    #settingsSheet{margin-bottom:8px}
    .settings-grid{display:grid;grid-template-columns:1fr;gap:10px}
    .settings-card{background:#141820;border:1px solid #252d3a;border-radius:12px;padding:0;overflow:hidden;min-width:0}
    .settings-card summary{list-style:none;cursor:pointer;padding:12px;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
    .settings-card summary::-webkit-details-marker{display:none}
    .settings-card .content{padding:0 12px 12px;overflow-x:hidden;max-width:100%;box-sizing:border-box}
    .stack{display:flex;flex-direction:column;gap:8px;min-width:0;overflow:hidden}
    .stack label{word-break:break-word;max-width:100%}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    #contextMainActions{flex-wrap:nowrap;overflow-x:auto}
    #contextMainActions button{white-space:nowrap}
    .lorebook-entry{background:#0f1320;border:1px solid #2b3444;border-radius:10px;padding:10px;display:flex;flex-direction:column;gap:6px;overflow:hidden;min-width:0;flex-shrink:0}
    .lorebook-entry .lbe-row{display:flex;gap:6px;align-items:center;min-width:0}
    .lorebook-entry .lbe-kw{flex:1;min-width:0;height:32px}
    .lorebook-entry .lbe-content{width:100%;min-height:60px;max-height:120px;resize:vertical;font-size:12px;box-sizing:border-box}
    .lorebook-entry .lbe-del{background:var(--danger);padding:6px 10px;font-size:12px;border-radius:6px;flex-shrink:0}
    .lorebook-entry .lbe-checks{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
    .lorebook-entry .lbe-checks label{display:flex;align-items:center;gap:4px;white-space:nowrap;font-size:12px}
    .lorebook-entry input[type="text"],.lorebook-entry textarea{font-size:13px;padding:8px}
    #lorebookEntries{max-height:50vh;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;gap:8px;padding-right:2px}
    #lorebookEntries::-webkit-scrollbar{width:3px}
    #lorebookEntries::-webkit-scrollbar-thumb{background:#3a4560;border-radius:3px}
    @media (min-width:900px){
      .settings-grid{grid-template-columns:1fr 1fr}
      .settings-card.full{grid-column:1/-1;max-width:100%;overflow:hidden}
    }
    @media (max-width:600px){ .wrap{padding:8px} .msg{max-width:94%} }
    /* Swipe controls */
    .swipe-controls{display:flex;gap:6px;align-items:center;justify-content:center;padding:4px 0;font-size:12px;opacity:0.85;flex-wrap:wrap}
    .swipe-btn{background:none;border:1px solid #333;border-radius:6px;padding:4px 8px;color:#aaa;font-size:14px;cursor:pointer}
    .swipe-btn:hover{background:#2a2a3e;color:#fff}
    .gen-info{font-size:11px;color:#8f9bb0;opacity:.95;margin-left:4px}
    /* Edit message */
    .msg-wrapper{display:flex;flex-direction:column;align-items:flex-start;max-width:86%}
    .msg-wrapper.me-wrap{align-self:flex-end;align-items:flex-end}
    .msg-edit-bar{display:flex;gap:4px;margin-top:4px}
    .msg-edit-icon{background:#2a3040;border:1px solid #3a4560;font-size:12px;cursor:pointer;padding:4px 8px;color:#d5def0;border-radius:6px}
    .msg-edit-icon:hover{background:#36425c}
    .edit-area{width:100%;min-height:60px;resize:vertical;font-size:14px;padding:8px;border-radius:10px;background:#1e2233;color:var(--text);border:1px solid #3a4560}
    .edit-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
    .edit-actions button{font-size:12px;padding:6px 10px;border-radius:8px}
    /* Streaming typing indicator */
    .typing-dots::after{content:'...';animation:dots 1.2s steps(3,end) infinite}
    @keyframes dots{0%{content:'.'}33%{content:'..'}66%{content:'...'}}
    /* Reasoning block */
    .reasoning-block{font-size:12px;color:#8ec5ff;margin-top:6px}
    .reasoning-block summary{cursor:pointer;opacity:0.7;font-style:italic}
    .reasoning-block pre{white-space:pre-wrap;margin:4px 0;font-size:11px;color:#a8c0e0;max-height:200px;overflow-y:auto}
    /* Group chat name label */
    .char-label{font-size:11px;font-weight:700;margin-bottom:2px;padding:0 2px}
    /* Prompt block */
    .prompt-block{display:flex;gap:6px;align-items:center;padding:6px 8px;background:#0f1320;border-radius:8px;margin:3px 0}
    .prompt-block label{flex:1;font-size:13px}
    .prompt-block button{background:#2a3040;color:#d5def0;font-size:12px;padding:4px 8px;border-radius:6px;font-weight:400}
    /* Add provider form */
    #addProviderForm{display:none;flex-direction:column;gap:6px;margin-top:6px;padding:10px;background:#0f1320;border-radius:10px;border:1px solid #2b3444}
    /* Provider list */
    .provider-item{background:#0f1320;border:1px solid #2b3444;border-radius:8px;padding:8px 10px;display:flex;flex-direction:column;gap:6px}
    .provider-item.active-prov{border-color:#4f8cff}
    .provider-item-header{display:flex;align-items:center;gap:8px;min-width:0}
    .provider-item-name{font-weight:700;font-size:13px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .provider-item-badge{font-size:10px;background:#1a3060;color:#8ec5ff;border-radius:4px;padding:2px 6px;flex-shrink:0}
    .provider-item-btns{display:flex;gap:4px;flex-shrink:0}
    .prov-btn{background:#2a3040;color:#d5def0;border-radius:6px;font-size:11px;padding:3px 8px;font-weight:400;border:none;cursor:pointer}
    .prov-btn.danger{background:var(--danger)}
    .prov-btn.primary{background:var(--accent)}
    .provider-item-url{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    /* Edit provider inline form */
    .prov-edit-form{display:none;flex-direction:column;gap:6px;margin-top:4px;padding:8px;background:#141820;border-radius:8px;border:1px solid #252d3a}
    .prov-edit-form.open{display:flex}
    .prov-model-select{width:100%;margin-top:4px}
  </style>
</head>
<body>
  <div class="wrap">
    <dialog id="customConfirm">
      <p id="customConfirmText">Are you sure?</p>
      <div class="actions">
        <button id="customConfirmCancel" class="secondary">Cancel</button>
        <button id="customConfirmOk" class="danger">OK</button>
      </div>
    </dialog>

    <div class="top">
      <div class="banner">
        <div class="banner-title" id="botTitle">JSON Context Bot</div>
        <div style="display:flex;gap:6px;align-items:center">
          <select id="quickModelSelect" style="background:#1e2638;color:#c8d6e8;border:1px solid #2d3a50;border-radius:8px;padding:4px 8px;font-size:12px;max-width:160px;cursor:pointer" title="Quick model switch"></select>
          <button id="toggleSettingsBtn" class="secondary icon-btn" title="Settings" aria-label="Settings">⚙️</button>
        </div>
      </div>
      <div id="settingsSheet" class="panel hidden">
        <div class="settings-grid">
          <details class="settings-card full">
            <summary>Context</summary>
            <div class="content stack">
              <select id="contextSelect"></select>
              <div class="actions">
                <input id="contextLabel" placeholder="Bot name for this JSON (e.g. Tomoe)" style="flex:1;min-width:220px;" />
              </div>
              <div class="actions" id="contextMainActions">
                <button id="saveLabelBtn" class="secondary">Save</button>
                <button id="switchBtn">Switch</button>
                <button id="newChatBtn" class="secondary">New chat</button>
                <button id="resetBtn" class="secondary">Clear</button>
                <button id="deleteContextBtn" class="danger">🗑️ Delete</button>
              </div>

              <div class="settings-card" style="padding:10px; border:1px solid #2b3444; overflow:hidden;">
                <div class="settings-title" style="margin-bottom:6px;">AI tuning for this JSON bot</div>
                <div class="stack">
                  <label>Creativity</label>
                  <select id="aiCreativity">
                    <option value="low">Không (low)</option>
                    <option value="balanced">Trung tính</option>
                    <option value="creative">Sáng tạo</option>
                    <option value="very_creative">Rất sáng tạo</option>
                  </select>

                  <label>Context behavior</label>
                  <select id="aiContextMode">
                    <option value="strict">Rất bám sát</option>
                    <option value="balanced">Trung tính</option>
                    <option value="develop">Tạo ngữ cảnh mới (phát triển từ hiện tại)</option>
                    <option value="new">Sáng tạo ngữ cảnh</option>
                  </select>

                  <label>Context window</label>
                  <select id="aiContextWindow">
                    <option value="100k">100K token (thực tế: history cap lớn)</option>
                    <option value="500_messages">500 câu chat gần nhất</option>
                  </select>

                  <label>Reasoning</label>
                  <select id="aiReasoning">
                    <option value="off">Không cho phép</option>
                    <option value="on">Cho phép</option>
                  </select>

                  <label>Trả lời của AI</label>
                  <select id="aiResponseLength">
                    <option value="short">Ngắn</option>
                    <option value="normal">Bình thường</option>
                    <option value="long">Dài</option>
                    <option value="detailed">Chi tiết</option>
                    <option value="very_detailed">Rất chi tiết</option>
                  </select>

                  <label>Độ dài mục tiêu (50-500 chữ): <span id="aiTargetWordsLabel">180</span></label>
                  <input id="aiTargetWords" type="range" min="50" max="500" step="10" value="180" />

                  <label>Uncensored</label>
                  <select id="aiNsfw">
                    <option value="on">🔓 ON — No filter</option>
                    <option value="off">🔒 OFF — Safe mode</option>
                  </select>

                  <label>Ngôn ngữ Memory/Lorebook</label>
                  <select id="aiLanguage">
                    <option value="vi">🇻🇳 Tiếng Việt</option>
                    <option value="en">🇺🇸 English</option>
                  </select>

                  <label>Author's Note</label>
                  <textarea id="aiAuthorsNote" rows="2" placeholder="Text injected at specified depth..."></textarea>
                  <label>Depth: <span id="aiNoteDepthLabel">4</span></label>
                  <input id="aiNoteDepth" type="range" min="1" max="20" value="4" />

                  <div class="actions">
                    <button id="saveAiBtn" class="secondary">Save AI tuning</button>
                  </div>
                </div>
              </div>
            </div>
          </details>

          <details class="settings-card">
            <summary>Chats</summary>
            <div class="content stack">
              <select id="sessionSelect"></select>
              <div class="actions">
                <button id="openSessionBtn" class="secondary">Open</button>
                <button id="deleteSessionBtn" class="danger">Delete chat</button>
              </div>
            </div>
          </details>

          <details class="settings-card">
            <summary>📂 Upload JSON Context</summary>
            <div class="content stack">
              <div class="actions">
                <input id="uploadName" placeholder="new-context.json" style="flex:1;min-width:140px;" />
                <button id="pickFileBtn" class="secondary">Pick file</button>
                <button id="toggleUploadBtn" class="secondary">Paste JSON</button>
                <input id="uploadFile" type="file" accept=".json,application/json" class="hidden" />
              </div>
              <textarea id="uploadJson" class="hidden" placeholder="Paste JSON context here..."></textarea>
              <div class="actions hidden" id="uploadActions">
                <select id="normalizeModel" style="background:#1e2638;color:#c8d6e8;border:1px solid #2d3a50;border-radius:8px;padding:4px 8px;font-size:12px;max-width:140px" title="Model cho normalize"></select>
                <button id="normalizeBtn" class="secondary" title="AI dịch &amp; chuẩn hoá JSON">✨ Normalize</button>
                <span id="normalizeStatus" style="font-size:11px;color:var(--muted);display:none">⏳ đang xử lý…</span>
                <button id="uploadBtn">Save &amp; Switch</button>
                <button id="cancelUploadBtn" class="secondary">Cancel</button>
              </div>
            </div>
          </details>

          <details class="settings-card full">
            <summary>🧠 Brain (API Providers)</summary>
            <div class="content stack">
              <div style="display:flex;justify-content:space-between;align-items:center">
                <span style="font-size:12px;color:var(--muted)">Providers</span>
                <button id="addProviderBtn" class="secondary" style="font-size:11px;padding:4px 10px">+ Add</button>
              </div>

              <div id="providerList" class="stack"></div>

              <div id="addProviderForm">
                <div style="font-size:12px;color:var(--muted);font-weight:700;margin-bottom:2px">New Provider</div>
                <input id="newProvName" placeholder="Provider name (e.g. OpenAI)" />
                <input id="newProvUrl" placeholder="Base URL (e.g. https://api.openai.com/v1)" />
                <input id="newProvKey" placeholder="API Key" />
                <input id="newProvModels" placeholder="Models (comma-separated, e.g. gpt-4o, gpt-4o-mini)" />
                <div class="actions">
                  <button id="saveNewProvBtn" class="secondary">Save Provider</button>
                  <button id="cancelNewProvBtn" class="secondary">Cancel</button>
                </div>
              </div>
            </div>
          </details>

          <details class="settings-card full">
            <summary>Memory.md (per JSON bot)</summary>
            <div class="content stack">
              <textarea id="memoryEditor" placeholder="Memory for this JSON bot..." style="min-height:180px;"></textarea>
              <div class="actions">
                <button id="saveMemoryBtn" class="secondary">Save memory</button>
                <button id="reloadMemoryBtn" class="secondary">Reload memory</button>
                <button id="summarizeNowBtn" class="secondary">Summarize now</button>
              </div>
              <div id="conflictLine" class="meta">Conflicts: 0</div>
            </div>
          </details>

          <details class="settings-card full">
            <summary>Lorebook / World Info (<span id="lorebookCount">0</span> entries)</summary>
            <div class="content stack">
              <div id="lorebookEntries"></div>
              <div class="actions">
                <button id="addLorebookBtn" class="secondary">+ Add entry</button>
                <button id="genLorebookBtn" class="secondary">Auto-generate from JSON</button>
                <button id="saveLorebookBtn" class="secondary">Save</button>
                <button id="reloadLorebookBtn" class="secondary">Reload</button>
              </div>
            </div>
          </details>
          <details class="settings-card full">
            <summary>Group Chat</summary>
            <div class="content stack">
              <label>Group Name</label>
              <input id="groupName" placeholder="my-group" />
              <label>Members (select characters)</label>
              <div id="groupMembers"></div>
              <label>Talk Order</label>
              <select id="groupTalkOrder">
                <option value="round-robin">Round Robin</option>
                <option value="ai-decides">AI Decides</option>
              </select>
              <div class="actions">
                <button id="saveGroupBtn" class="secondary">Save Group</button>
              </div>
            </div>
          </details>

          <details class="settings-card full">
            <summary>Prompt Manager</summary>
            <div class="content stack">
              <div id="promptBlocks"></div>
              <div class="actions">
                <button id="savePromptOrderBtn" class="secondary">Save Order</button>
              </div>
            </div>
          </details>

          <details class="settings-card full">
            <summary>👤 User Profile</summary>
            <div class="content stack">
              <label>Tên của bạn (thay thế {user})</label>
              <input id="userName" placeholder="Ví dụ: Minh, Anh, ..." />
              <label>Mô tả (AI sẽ biết về bạn)</label>
              <textarea id="userDescription" rows="3" placeholder="Ví dụ: Là một chàng trai 22 tuổi, hiếu động, thích phưu lưu..."></textarea>
              <div class="actions">
                <button id="saveUserProfileBtn" class="secondary">Save</button>
              </div>
            </div>
          </details>
        </div>
      </div>
    </div>

    <div id="chat"></div>
    <div id="reasoningStatus" class="status-line">Status: ready</div>
  </div>

  <div class="composer">
    <div class="composer-inner">
      <textarea id="input" placeholder="Message"></textarea>
      <button id="quickActionBtn" class="secondary composer-icon-btn" title="Add action" aria-label="Add action">＋</button>
      <button id="sendBtn" class="composer-icon-btn" title="Send" aria-label="Send">➤</button>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const chatEl = $('chat');
    const inputEl = $('input');
    const contextSelect = $('contextSelect');
    const sessionSelect = $('sessionSelect');
    const reasoningStatusEl = $('reasoningStatus');
    let contextLabels = {};

    // ── Swipe state ──
    // Per-message swipe alternatives: swipeMap[msgIndex] = { variants:[], current:0 }
    const swipeMap = {};

    // ── Group chat state ──
    let groupCharColors = {};
    const CHAR_COLORS = ['#4f8cff','#ff7eb3','#7ed957','#ffb347','#c77dff','#00d2d3','#ff6b6b'];

    function charColor(name) {
      if (!groupCharColors[name]) {
        const idx = Object.keys(groupCharColors).length % CHAR_COLORS.length;
        groupCharColors[name] = CHAR_COLORS[idx];
      }
      return groupCharColors[name];
    }

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function renderRoleplayText(text) {
      const src = String(text || '');
      const tokenRe = /(\*\*[^*\n]+\*\*|\*[^*\n]+\*)/g;

      let out = '';
      let last = 0;
      let match;

      while ((match = tokenRe.exec(src)) !== null) {
        const plain = src.slice(last, match.index);
        if (plain) out += `<span class="dialogue-text">${escapeHtml(plain)}</span>`;
        out += `<span class="scene-beat">${escapeHtml(match[0])}</span>`;
        last = tokenRe.lastIndex;
      }

      const tail = src.slice(last);
      if (tail) out += `<span class="dialogue-text">${escapeHtml(tail)}</span>`;

      if (!out) out = `<span class="dialogue-text">${escapeHtml(src)}</span>`;
      return out.replace(/\n/g, '<br>');
    }

    function shortModelName(model) {
      if (!model) return '';
      const s = String(model);
      return s.includes('/') ? s.split('/').pop() : s;
    }

    function formatGenInfo(info = {}) {
      const parts = [];
      if (info.model) parts.push(shortModelName(info.model));
      if (Number(info.totalTokens) > 0) parts.push(`${info.totalTokens} tok`);
      return parts.join(' · ');
    }

    // msgIndex = position in conversation (for edit API), charName optional for group
    function addMsg(text, who='bot', { msgIndex = -1, charName = null, isTyping = false, noSave = false, genInfo = null } = {}) {
      // Wrapper div
      const wrapper = document.createElement('div');
      wrapper.className = `msg-wrapper${who === 'me' ? ' me-wrap' : ''}`;
      if (noSave) wrapper.dataset.nosave = 'true';

      // Character label (group mode)
      if (charName) {
        const lbl = document.createElement('div');
        lbl.className = 'char-label';
        lbl.style.color = charColor(charName);
        lbl.textContent = charName;
        wrapper.appendChild(lbl);
      }

      // Message bubble
      const div = document.createElement('div');
      div.className = `msg ${who === 'me' ? 'me' : 'bot'}`;
      if (isTyping) {
        div.innerHTML = '<span class="typing-dots"></span>';
      } else {
        div.innerHTML = renderRoleplayText(text);
      }
      wrapper.appendChild(div);


      // Swipe controls (only for bot messages, ignore noSave messages)
      if (who === 'bot' && !isTyping && msgIndex >= 0 && !noSave) {
        const sw = swipeMap[msgIndex];
        const total = sw ? sw.variants.length : 1;
        const current = sw ? sw.current + 1 : 1;
        const swipeDiv = document.createElement('div');
        swipeDiv.className = 'swipe-controls';
        swipeDiv.dataset.msgIndex = msgIndex;
        swipeDiv.innerHTML = `
          <button class="swipe-btn" onclick="swipe('prev',${msgIndex})">◀</button>
          <span class="swipe-counter">${current}/${total}</span>
          <button class="swipe-btn" onclick="swipe('next',${msgIndex})">▶</button>
          <button class="swipe-btn" onclick="swipe('new',${msgIndex})">🔄</button>
          <button class="swipe-btn" onclick="editMsg(${msgIndex}, 'bot')">✏️</button>
          <span class="gen-info" id="genInfo-${msgIndex}">${formatGenInfo(genInfo || {})}</span>
        `;
        wrapper.appendChild(swipeDiv);
      } else if (!isTyping && msgIndex >= 0 && !noSave) {
        // User/system message: keep one always-visible edit button
        const editBar = document.createElement('div');
        editBar.className = 'msg-edit-bar';
        editBar.innerHTML = `<button class="msg-edit-icon" onclick="editMsg(${msgIndex}, '${who}')">✏️ Edit</button>`;
        wrapper.appendChild(editBar);
      }

      chatEl.appendChild(wrapper);
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
      return { wrapper, bubble: div };
    }

    function editMsg(msgIndex, who = 'bot') {
      const swipeDiv = chatEl.querySelector(`.swipe-controls[data-msg-index="${msgIndex}"]`);
      let wrapper = swipeDiv ? swipeDiv.closest('.msg-wrapper') : null;

      if (!wrapper) {
        // fallback for non-bot messages
        const all = Array.from(chatEl.querySelectorAll('.msg-wrapper'));
        wrapper = all.find(w => {
          const btn = w.querySelector(`.msg-edit-icon[onclick*="editMsg(${msgIndex}"]`);
          return Boolean(btn);
        }) || null;
      }
      if (!wrapper) return;

      const bubble = wrapper.querySelector(who === 'me' ? '.msg.me' : '.msg.bot') || wrapper.querySelector('.msg');
      if (!bubble) return;
      const plain = bubble.textContent || '';
      startEditMessage(wrapper, bubble, plain, msgIndex, who);
    }

    function startEditMessage(wrapper, bubble, originalText, msgIndex, who) {
      wrapper.classList.remove('show-edit');
      // Replace bubble content with textarea
      bubble.style.display = 'none';
      const ta = document.createElement('textarea');
      ta.className = 'edit-area';
      ta.value = originalText;
      const actions = document.createElement('div');
      actions.className = 'edit-actions';
      const saveBtn = document.createElement('button');
      saveBtn.className = 'secondary';
      saveBtn.textContent = 'Save';
      const regenBtn = document.createElement('button');
      regenBtn.textContent = 'Save & Regen ▶';
      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'secondary';
      cancelBtn.textContent = 'Cancel';

      saveBtn.onclick = async () => {
        const newContent = ta.value.trim();
        await doEditMessage(msgIndex, newContent, false);
        bubble.innerHTML = renderRoleplayText(newContent);
        bubble.style.display = '';
        ta.remove(); actions.remove();
      };
      regenBtn.onclick = async () => {
        const newContent = ta.value.trim();
        bubble.style.display = '';
        ta.remove(); actions.remove();
        await doEditMessage(msgIndex, newContent, true);
      };
      cancelBtn.onclick = () => {
        bubble.style.display = '';
        ta.remove(); actions.remove();
      };

      actions.appendChild(saveBtn);
      actions.appendChild(regenBtn);
      actions.appendChild(cancelBtn);
      wrapper.insertBefore(ta, bubble.nextSibling);
      wrapper.insertBefore(actions, ta.nextSibling);
      ta.focus();
    }

    async function doEditMessage(index, content, regenerate) {
      try {
        const r = await fetch('/api/edit-message', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ index, content, regenerate })
        });
        const j = await r.json();
        if (j.error) { addMsg('[Edit error] ' + j.error, 'bot'); return; }
        await loadMessages();
      } catch (e) {
        addMsg('[Edit error] ' + e.message, 'bot');
      }
    }

    // Swipe function
    async function swipe(direction, msgIndex) {
      try {
        const r = await fetch('/api/swipe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ direction, msgIndex })
        });
        const j = await r.json();
        if (j.error) { addMsg('[Swipe error] ' + j.error, 'bot'); return; }

        // Update swipeMap
        if (!swipeMap[msgIndex]) swipeMap[msgIndex] = { variants: [], current: 0 };
        if (j.variants) swipeMap[msgIndex].variants = j.variants;
        if (typeof j.current === 'number') swipeMap[msgIndex].current = j.current;

        // Find the wrapper and update bubble + counter
        const swipeDiv = chatEl.querySelector(`.swipe-controls[data-msg-index="${msgIndex}"]`);
        if (swipeDiv) {
          const wrapper = swipeDiv.closest('.msg-wrapper');
          if (wrapper) {
            const bubble = wrapper.querySelector('.msg.bot');
            if (bubble && j.content) bubble.innerHTML = renderRoleplayText(j.content);
          }
          const counter = swipeDiv.querySelector('.swipe-counter');
          if (counter) {
            const total = swipeMap[msgIndex].variants.length || 1;
            counter.textContent = `${swipeMap[msgIndex].current + 1}/${total}`;
          }
          const genInfoEl = swipeDiv.querySelector('.gen-info');
          if (genInfoEl) genInfoEl.textContent = formatGenInfo(j.genInfo || {});
        }
      } catch (e) {
        addMsg('[Swipe error] ' + e.message, 'bot');
      }
    }

    // Bypass webview blocking 'window.confirm'
    function showConfirm(msg) {
      return new Promise(resolve => {
        const dialog = $('customConfirm');
        $('customConfirmText').textContent = msg;
        dialog.showModal();
        const cancelBtn = $('customConfirmCancel');
        const okBtn = $('customConfirmOk');
        
        function cleanup() {
          cancelBtn.onclick = null;
          okBtn.onclick = null;
          dialog.close();
        }
        
        cancelBtn.onclick = () => { cleanup(); resolve(false); };
        okBtn.onclick = () => { cleanup(); resolve(true); };
      });
    }

    async function loadMessages() {
      const r = await fetch('/api/messages');
      const j = await r.json();
      clearChat();
      Object.keys(swipeMap).forEach(k => delete swipeMap[k]);
      (j.messages || []).forEach((m, idx) => {
        if (m.role === 'assistant') {
          const variants = Array.isArray(m.alternatives) && m.alternatives.length ? m.alternatives : [m.content || ''];
          const current = Number.isInteger(m.activeIndex) ? m.activeIndex : 0;
          swipeMap[idx] = { variants, current };
        }
        addMsg(m.content, m.role === 'user' ? 'me' : 'bot', { msgIndex: idx, charName: m.charName || null, genInfo: m.genInfo || null });
      });
      if (!j.messages || j.messages.length === 0) {
        addMsg('Ready. Start chatting ✨', 'bot');
      }
    }

      const name = contextSelect.value;

        const r = await fetch('/api/context', {
          method: 'DELETE',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': window.authToken ? `Bearer ${window.authToken}` : ''

    let lorebookData = [];

    function renderLorebookEntries() {
      const container = $('lorebookEntries');
      $('lorebookCount').textContent = lorebookData.length;
      container.innerHTML = '';
      if (!lorebookData.length) {
        container.innerHTML = '<div class="meta">No entries yet. Click "+ Add entry" or "Auto-generate".</div>';
        return;
      }
      lorebookData.forEach((entry, idx) => {
        const div = document.createElement('div');
        div.className = 'lorebook-entry';
        div.innerHTML = `
          <div class="lbe-row">
            <input class="lbe-kw" data-idx="${idx}" data-field="keywords" value="${(entry.keywords||[]).join(', ')}" placeholder="keywords..." />
            <button class="lbe-del" data-idx="${idx}">✕</button>
          </div>
          <textarea class="lbe-content" data-idx="${idx}" data-field="content" placeholder="Description...">${entry.content||''}</textarea>
          <div class="lbe-checks">
            <label><input type="checkbox" data-idx="${idx}" data-field="enabled" ${entry.enabled!==false?'checked':''} style="width:auto"> On</label>
            <label><input type="checkbox" data-idx="${idx}" data-field="constant" ${entry.constant?'checked':''} style="width:auto"> Always</label>
          </div>
        `;
        container.appendChild(div);
      });

      // Events
      container.querySelectorAll('input[data-field="keywords"]').forEach(el => {
        el.addEventListener('input', e => {
          const idx = +e.target.dataset.idx;
          lorebookData[idx].keywords = e.target.value.split(',').map(s=>s.trim()).filter(Boolean);
        });
      });
      container.querySelectorAll('textarea[data-field="content"]').forEach(el => {
        el.addEventListener('input', e => {
          const idx = +e.target.dataset.idx;
          lorebookData[idx].content = e.target.value;
        });
      });
      container.querySelectorAll('input[data-field="enabled"]').forEach(el => {
        el.addEventListener('change', e => {
          const idx = +e.target.dataset.idx;
          lorebookData[idx].enabled = e.target.checked;
        });
      });
      container.querySelectorAll('input[data-field="constant"]').forEach(el => {
        el.addEventListener('change', e => {
          const idx = +e.target.dataset.idx;
          lorebookData[idx].constant = e.target.checked;
        });
      });
      container.querySelectorAll('.lbe-del').forEach(el => {
        el.addEventListener('click', e => {
          const idx = +e.target.dataset.idx;
          lorebookData.splice(idx, 1);
          renderLorebookEntries();
        });
      });
    }

          renderPromptBlocks();
        };
        const downBtn = document.createElement('button');

          if (idx === promptOrderData.length - 1) return;
          [promptOrderData[idx+1], promptOrderData[idx]] = [promptOrderData[idx], promptOrderData[idx+1]];
          renderPromptBlocks();
        };
        div.appendChild(cb);
        div.appendChild(lbl);
        div.appendChild(upBtn);
        div.appendChild(downBtn);
        container.appendChild(div);

    async function loadProviders() {
      try {
        const r = await fetch('/api/providers');
        const j = await r.json();
        if (j.error) return;
        providersData = j.providers || [];
        activeProviderIdx = j.activeProviderIdx ?? 0;
        activeModelName = j.activeModel || '';
        renderProviderList();
        // Populate quick model selector and normalize model selector
        const quickSel = $('quickModelSelect');
        const normSel = $('normalizeModel');
        [quickSel, normSel].forEach(sel => {
          if (!sel) return;
          const prevVal = sel.value;
          sel.innerHTML = '';
          providersData.forEach((p, pidx) => {
            (p.models || []).forEach(m => {
              const op = document.createElement('option');
              op.value = JSON.stringify({ pidx, model: m });
              op.textContent = (providersData.length > 1 ? `[${p.name||pidx}] ` : '') + m;
              if (m === activeModelName && pidx === activeProviderIdx) op.selected = true;
              sel.appendChild(op);
            });
          });
          if (!sel.options.length && activeModelName) {
            const op = document.createElement('option');
            op.value = JSON.stringify({ pidx: 0, model: activeModelName });
            op.textContent = activeModelName; op.selected = true;
            sel.appendChild(op);
          }
          // Restore previous selection if still valid
          if (prevVal) { try { sel.value = prevVal; } catch {} }
        });

      } catch {}
    }

    async function switchToProvider(pidx, model) {
      try {
        const r = await fetch('/api/provider', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ providerIndex: pidx, model })
        });
        const j = await r.json();
        if (j.error) return addMsg('[Provider error] ' + j.error, 'bot');
        activeProviderIdx = pidx;
        activeModelName = model || j.activeModel;
        renderProviderList();
        // sync quick select
        const quickSel = $('quickModelSelect');
        if (quickSel) {
          for (const op of quickSel.options) {
            try {
              const v = JSON.parse(op.value);
              op.selected = v.pidx === pidx && v.model === activeModelName;
            } catch {}
          }
        }
        addMsg(`✅ Active: ${providersData[pidx]?.name || 'Provider'} → ${activeModelName}`, 'bot');
      } catch (e) {
        addMsg('[Provider error] ' + e.message, 'bot');
      }
    }

    async function normalizeContext() {
      const jsonText = $('uploadJson').value.trim();
      if (!jsonText) return addMsg('⚠️ Paste JSON trước khi normalize!', 'bot');

      // Validate JSON first
      try { JSON.parse(jsonText); } catch { return addMsg('⚠️ JSON không hợp lệ! Vui lòng kiểm tra lại.', 'bot'); }

      const lang = $('aiLanguage') ? $('aiLanguage').value : 'vi';
      // Get selected model from normalizeModel dropdown
      const nmSel = $('normalizeModel');
      let overrideModel = null;
      if (nmSel && nmSel.value) {
        try { overrideModel = JSON.parse(nmSel.value); } catch {}
      }

      const statusEl = $('normalizeStatus');
      const btn = $('normalizeBtn');
      statusEl.style.display = 'inline';
      btn.disabled = true;
      btn.textContent = '⏳';

      try {
        const r = await fetch('/api/context/normalize', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': window.authToken ? `Bearer ${window.authToken}` : ''
          },
          body: JSON.stringify({ jsonText, language: lang, overrideModel })
        });
        const j = await r.json();
        if (j.error) {
          addMsg('⚠️ Lỗi Normalize: ' + j.error, 'bot');
          return;
        }
        $('uploadJson').value = j.jsonText;

        // Auto-set filename from character name
        if (j.charName) {
          const safeFn = j.charName.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '') + '.json';
          $('uploadName').value = safeFn;
        }
        addMsg(`✅ Đã normalize “${j.charName || 'nhân vật'}” sang ${lang === 'vi' ? 'Tiếng Việt' : 'English'}! Kiểm tra JSON rồi nhấn “Save & Switch”.`, 'bot');
      } catch (e) {
        addMsg('⚠️ Lỗi: ' + e.message, 'bot');
      } finally {
        statusEl.style.display = 'none';
        btn.disabled = false;
        btn.textContent = '✨ Normalize';
      }
    }

    async function send() {
      const msg = inputEl.value.trim();
      if (!msg) return;
      inputEl.value = '';
      // Get current message count for index
      const msgCount = chatEl.querySelectorAll('.msg-wrapper:not([data-nosave="true"])').length;
      addMsg(msg, 'me', { msgIndex: msgCount });

      // Create assistant bubble with typing indicator
      const botMsgIndex = msgCount + 1;
      const { wrapper: botWrapper, bubble: botBubble } = addMsg('', 'bot', { msgIndex: botMsgIndex, isTyping: true });
      reasoningStatusEl.textContent = 'Status: generating...';

      let fullContent = '';
      let reasoningContent = '';

      try {
        const r = await fetch('/api/chat-stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: msg })
        });

        if (!r.ok || !r.body) {
          // Fallback to non-streaming
          const j = await r.json().catch(() => ({ error: 'Stream failed' }));
          botBubble.innerHTML = renderRoleplayText(j.reply || j.error || 'Error');
          reasoningStatusEl.textContent = 'Status: done';
          await loadSessions();
          return;
        }

        const reader = r.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        botBubble.innerHTML = ''; // clear typing dots

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop(); // keep incomplete line

          for (const line of lines) {
            if (!line.startsWith('data:')) continue;
            const raw = line.slice(5).trim();
            if (!raw || raw === '[DONE]') continue;
            try {
              const chunk = JSON.parse(raw);
              if (typeof chunk.reasoning === 'string') {
                reasoningContent += chunk.reasoning;
              }
              if (chunk.token) {
                fullContent += chunk.token;
                botBubble.innerHTML = renderRoleplayText(fullContent);
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
              }
              if (chunk.done) {
                if (chunk.error) throw new Error(chunk.error);
                if (chunk.content) {
                  fullContent = chunk.content;
                  botBubble.innerHTML = renderRoleplayText(fullContent);
                }
                if (chunk.reasoning && typeof chunk.reasoning.reasoningContent === 'string') {
                  reasoningContent = chunk.reasoning.reasoningContent;
                }
                // Info block (Model, Tokens, Reasoning)
                let statusParts = [];
                const info = chunk.info || chunk.reasoning || {};
                
                if (info.model) statusParts.push(`Model: ${info.model.split('/').pop()}`);
                if (info.totalTokens) statusParts.push(`Tokens: ${info.totalTokens}`);

                const rt = info.reasoningTokens || 0;
                if (rt > 0) statusParts.push(`Reasoning: ${rt}`);
                else if (info.enabled) statusParts.push(`Reasoning: hidden`);

                if (statusParts.length > 0) {
                  reasoningStatusEl.textContent = statusParts.join(' • ');
                } else {
                  reasoningStatusEl.textContent = 'Reasoning: OFF';
                }

                if (reasoningContent) {
                  const details = document.createElement('details');
                  details.className = 'reasoning-block';
                  details.innerHTML = `<summary>Reasoning (${rt} tokens)</summary><pre>${reasoningContent.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre>`;
                  botWrapper.insertBefore(details, botBubble.nextSibling);
                }
                await loadSessions();
                // Add swipe controls now that msg is final
                const existingSwipe = botWrapper.querySelector('.swipe-controls');
                if (!existingSwipe) {
                  const swipeDiv = document.createElement('div');
                  swipeDiv.className = 'swipe-controls';
                  swipeDiv.dataset.msgIndex = botMsgIndex;
                  swipeDiv.innerHTML = `
                    <button class="swipe-btn" onclick="swipe('prev',${botMsgIndex})">◀</button>
                    <span class="swipe-counter">1/1</span>
                    <button class="swipe-btn" onclick="swipe('next',${botMsgIndex})">▶</button>
                    <button class="swipe-btn" onclick="swipe('new',${botMsgIndex})">🔄</button>
                    <button class="swipe-btn" onclick="editMsg(${botMsgIndex}, 'bot')">✏️</button>
                    <span class="gen-info" id="genInfo-${botMsgIndex}">${formatGenInfo(info)}</span>
                  `;
                  botWrapper.appendChild(swipeDiv);
                }
                await loadSessions();
              }
            } catch (_) {}
          }
        }
      } catch (e) {
        botBubble.innerHTML = renderRoleplayText('[Network error] ' + e.message);
        reasoningStatusEl.textContent = `Status: network error · ${e.message}`;
      }
    }

    function insertAtCursor(el, text) {
      const start = el.selectionStart ?? el.value.length;
      const end = el.selectionEnd ?? el.value.length;
      const val = el.value;
      el.value = val.slice(0, start) + text + val.slice(end);
      const pos = start + text.length;
      el.focus();
      el.setSelectionRange(pos, pos);
    }

    // Best-effort block pull-to-refresh / edge-swipe back inside app
    let startX = 0, startY = 0;
    document.addEventListener('touchstart', (e) => {
      const t = e.touches && e.touches[0];
      if (!t) return;
      startX = t.clientX;
      startY = t.clientY;
    }, { passive: true });

    document.addEventListener('touchmove', (e) => {
      const t = e.touches && e.touches[0];
      if (!t) return;
      const dx = t.clientX - startX;
      const dy = t.clientY - startY;
      const fromLeftEdge = startX < 20;
      const fromRightEdge = startX > (window.innerWidth - 20);

      // block iOS/Android edge swipe navigation gestures
      if ((fromLeftEdge && dx > 8) || (fromRightEdge && dx < -8)) {
        e.preventDefault();
        return;
      }

      // block pull-to-refresh at top
      const atTop = (window.scrollY || document.documentElement.scrollTop || 0) <= 0;
      if (atTop && dy > 8) {
        e.preventDefault();
      }
    }, { passive: false });
